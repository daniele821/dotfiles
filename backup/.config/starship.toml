format = """
$container\
$directory\
$fossil_branch\
$fossil_metrics\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$hg_branch\
$jobs\
$python\
$conda\
$status\
$character"""

add_newline = false

[directory]
truncation_length = -1
truncation_symbol = "󰊢 "
read_only = " 󰌾"
style = "bold cyan"

[line_break]
disabled = true

[conda]
ignore_base = false

[python]
format = '(via )[(\($virtualenv\) )]($style)'

[status]
disabled = false
