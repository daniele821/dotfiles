# change focused or move window
binde = super, left, movefocus, l
binde = super, right, movefocus, r
binde = super, up, movefocus, u
binde = super, down, movefocus, d
binde = super shift, left, movewindow, l
binde = super shift, right, movewindow, r
binde = super shift, up, movewindow, u
binde = super shift, down, movewindow, d

# change focused or move workspace
bind = super, 1, workspace, 1
bind = super, 2, workspace, 2
bind = super, 3, workspace, 3
bind = super, 4, workspace, 4
bind = super, 5, workspace, 5
bind = super, 6, workspace, 6
bind = super, 7, workspace, 7
bind = super, 8, workspace, 8
bind = super, 9, workspace, 9
bind = super shift, 1, movetoworkspace, 1
bind = super shift, 2, movetoworkspace, 2
bind = super shift, 3, movetoworkspace, 3
bind = super shift, 4, movetoworkspace, 4
bind = super shift, 5, movetoworkspace, 5
bind = super shift, 6, movetoworkspace, 6
bind = super shift, 7, movetoworkspace, 7
bind = super shift, 8, movetoworkspace, 8
bind = super shift, 9, movetoworkspace, 9
bind = super, s, workspace, 1000
bind = super shift, s, movetoworkspace, 1000
bind = super, a, exec, if [[ "$(hyprctl activeworkspace -j | jq .id)" -eq 1000 ]]; then ~/.config/hypr/scripts/prev.sh 1000; fi
bind = super, p, exec, ~/.config/hypr/scripts/prev.sh 1000
bind = super, o, workspace, empty
bind = super shift, o, movetoworkspace, empty
binde = super alt, left, workspace, e-1
binde = super alt, right, workspace, e+1
binde = super shift alt, left, movetoworkspace, e-1
binde = super shift alt, right, movetoworkspace, e+1

# various bindings
bind = super, q, killactive 
bind = super shift, q, exec, kill "$( hyprctl activewindow -j | jq .pid )" 
bind = super, f, fullscreen, 0
bind = super, m, fullscreen, 1
bind = super, v, togglefloating
bindm = super, mouse:272, movewindow
bindm = super, mouse:273, resizewindow
bind = super, i, exec, pkill -SIGUSR1 waybar || waybar
bind = super shift, i, exec, pkill -SIGUSR2 waybar || waybar

# launch apps 
bind = super, t, exec, konsole
bind = super, b, exec, firefox
bind = super, e, exec, pgrep wofi || wofi -aIi -S drun
bind = super shift, e, exec, hyprctl dispatch workspace empty; pgrep wofi || wofi -aIi -S drun

# screenshot 
bind = shift ,Print, exec, pgrep slurp || grim
bind = ,Print, exec, pgrep slurp || grim -g "$(slurp)" 

# fn keys 
binde=, XF86AudioRaiseVolume, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ 0 && wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel=, XF86AudioLowerVolume, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ 0 && wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel=, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel=, XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel=, XF86MonBrightnessDown, exec, brightnessctl set 5%- -n
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous
bindl = ,XF86AudioNext, exec, playerctl next

# lock screen 
bind = super, l, exec, hyprlock
bindl= ,switch:Lid Switch, exec, hyprlock
