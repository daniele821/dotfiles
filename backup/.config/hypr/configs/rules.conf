# remove gaps when maximized
workspace = f[1], gapsout:0
windowrulev2 = bordersize 0, fullscreen:1
windowrulev2 = rounding 0, fullscreen:1

# special workspace renamed
workspace = 100, defaultName:Special

# various fixes
windowrulev2 = rounding 0, xwayland:1
windowrulev2 = float, class:^org.mozilla.firefox$, title:^Picture-in-Picture$
