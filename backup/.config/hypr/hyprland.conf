### monitors ###
monitor=,preferred,auto,1

### daemons ###
exec-once = waybar
exec-once = nm-applet
exec-once = swaync
exec-once = /usr/libexec/polkit-gnome-authentication-agent-1

### variables ###
$mainMod = SUPER

### environment variables ###
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that

### variable sections ###
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    allow_tearing = false
    cursor_inactive_timeout = 5
}
decoration {
    rounding = 10
    blur {
        enabled = false
        size = 3
        passes = 1
    }
    drop_shadow = false
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}
animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}
input {
    kb_layout = it
    touchpad {
        natural_scroll = no
    }
    sensitivity = 0 
    repeat_delay = 300
}
dwindle {
    pseudotile = yes 
    preserve_split = yes 
}
master {
    new_is_master = false
}
gestures {
    workspace_swipe = off
}
misc {
    force_default_wallpaper = -1
}
device:epic-mouse-v1 {
    sensitivity = -0.5
}

### windowrules ###
# assign window to workspace
windowrule= workspace 1, ^(kitty)$
windowrule= workspace 2, ^(firefox)$
windowrule= workspace 3, ^(eog|totem|org.gnome.Nautilus|evince|org.gnome.TextEditor)$
windowrule= workspace 4, ^(libreoffice.*|soffice|Gimp|com.obsproject.Studio)$
# others
windowrulev2 = nomaximizerequest, class:.*
windowrulev2 = float, class:^(firefox)$, title:^(Picture-in-Picture|Firefox)$
### binds ###
# go to workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
# move to workspaces
bind = $mainMod Shift, 1, movetoworkspace, 1
bind = $mainMod Shift, 2, movetoworkspace, 2
bind = $mainMod Shift, 3, movetoworkspace, 3
bind = $mainMod Shift, 4, movetoworkspace, 4
bind = $mainMod Shift, 5, movetoworkspace, 5
bind = $mainMod Shift, 6, movetoworkspace, 6
bind = $mainMod Shift, 7, movetoworkspace, 7
bind = $mainMod Shift, 8, movetoworkspace, 8
bind = $mainMod Shift, 9, movetoworkspace, 9
# move focus 
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d
# move windows
bind = $mainMod Shift, left, movewindow, l
bind = $mainMod Shift, right, movewindow, r
bind = $mainMod Shift, up, movewindow, u
bind = $mainMod Shift, down, movewindow, d
# resize / move floating windows
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
binde = $mainMod Ctrl, right, resizeactive, 50 0
binde = $mainMod Ctrl, left, resizeactive, -50 0
binde = $mainMod Ctrl, up, resizeactive, 0 -50
binde = $mainMod Ctrl, down, resizeactive, 0 50
binde = $mainMod Alt, right, moveactive, 50 0
binde = $mainMod Alt, left, moveactive, -50 0
binde = $mainMod Alt, up, moveactive, 0 -50
binde = $mainMod Alt, down, moveactive, 0 50 
# fn buttons
bindel=, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl=, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel=, XF86MonBrightnessDown, exec, brightnessctl -q set 5%-
bindel=, XF86MonBrightnessUp, exec, brightnessctl -q set 5%+
# launch applications
bind = $mainMod, T, exec, kitty
bind = $mainMod, Return, exec, kitty
bind = $mainMod, B, exec, firefox
bind = $mainMod Shift, Return, exec, firefox
bind = $mainMod, N, exec, nautilus -w
# various session management
bind = $mainMod, Q, killactive, 
bind = $mainMod, F, fullscreen,
bind = $mainMod Shift, Q, exit, 
bind = $mainMod, V, togglefloating, 
bind = $mainMod, O, togglesplit, 
bind= $mainMod, Escape, exec, swaylock --color 222222
bindl= , switch:Lid Switch, exec, swaylock --color 222222
