# global binds to enter submaps
bind = super, escape, submap, reset
bind = super, f1, submap, clean
bind = super, f2, submap, resize

# submap with no binds
submap = clean
bind = super, escape, submap, reset
bind = super, f1, submap, clean
bind = super, f2, submap, resize
submap = reset

# submap for resizing
submap = resize
bind = super, escape, submap, reset
bind = super, f1, submap, clean
bind = super, f2, submap, resize
binde = super, left, moveactive, -10 0
binde = super, right, moveactive, 10 0
binde = super, down, moveactive, 0 10
binde = super, up, moveactive, 0 -10
binde = super shift, left, resizeactive, -10 0
binde = super shift, right, resizeactive, 10 0
binde = super shift, down, resizeactive, 0 10
binde = super shift, up, resizeactive, 0 -10
bind = super, c, centerwindow
submap = reset
