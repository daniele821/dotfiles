# do not allow windows to open maximized
windowrulev2 = suppressevent maximize, class:.* 

# smart gaps (disabled on special workspaces)
workspace = w[t1], gapsout:0
windowrulev2 = bordersize 0 , floating:0, onworkspace: w[t1]
windowrulev2 = rounding 0 , floating:0, onworkspace: w[t1]

# assign workspaces to apps (disabled on special workspaces)
windowrulev2 = workspace 1, class:^org\.kde\.konsole$, onworkspace: s[false]
windowrulev2 = workspace 2, class:^org\.mozilla\.firefox, onworkspace: s[false]


