# change focused or move window
bind = super, left, movefocus, l
bind = super, right, movefocus, r
bind = super, up, movefocus, u
bind = super, down, movefocus, d
bind = super, left, alterzorder, top
bind = super, right, alterzorder, top
bind = super, up, alterzorder, top
bind = super, down, alterzorder, top
binde = super shift, left, movewindow, l
binde = super shift, right, movewindow, r
binde = super shift, up, movewindow, u
binde = super shift, down, movewindow, d

# change focused or move workspace
bind = super, 1, workspace, 1
bind = super, 2, workspace, 2
bind = super, 3, workspace, 3
bind = super, 4, workspace, 4
bind = super, 5, workspace, 5
bind = super, 6, workspace, 6
bind = super, 7, workspace, 7
bind = super, 8, workspace, 8
bind = super, 9, workspace, 9
bind = super, 0, workspace, 10
bind = super shift, 1, movetoworkspace, 1
bind = super shift, 2, movetoworkspace, 2
bind = super shift, 3, movetoworkspace, 3
bind = super shift, 4, movetoworkspace, 4
bind = super shift, 5, movetoworkspace, 5
bind = super shift, 6, movetoworkspace, 6
bind = super shift, 7, movetoworkspace, 7
bind = super shift, 8, movetoworkspace, 8
bind = super shift, 9, movetoworkspace, 9
bind = super shift, 0, movetoworkspace, 10
bind = super alt, 1, movetoworkspacesilent, 1
bind = super alt, 2, movetoworkspacesilent, 2
bind = super alt, 3, movetoworkspacesilent, 3
bind = super alt, 4, movetoworkspacesilent, 4
bind = super alt, 5, movetoworkspacesilent, 5
bind = super alt, 6, movetoworkspacesilent, 6
bind = super alt, 7, movetoworkspacesilent, 7
bind = super alt, 8, movetoworkspacesilent, 8
bind = super alt, 9, movetoworkspacesilent, 9
bind = super alt, 0, movetoworkspacesilent, 10
bind = super, s, togglespecialworkspace,
bind = super shift, s, movetoworkspace, special:
bind = super alt, s, movetoworkspacesilent, special:
bind = super shift, a, movetoworkspace, e+0
binde = super alt, left, workspace, e-1
binde = super alt, right, workspace, e+1

# various bindings
bind = super, q, killactive 
bind = super, f, fullscreen, 0
bind = super shift, f, fullscreen, 2
bind = super, v, togglefloating
bind = super, o, togglesplit
bindm = super, mouse:272, movewindow
bindm = super, mouse:273, resizewindow

# cycle focus (requires: jq)
binde = super, grave, exec, if "$(hyprctl -j activewindow | jq .floating)" ; then hyprctl dispatch cyclenext tile; else hyprctl dispatch cyclenext float && hyprctl dispatch alterzorder top; fi
binde = super, tab, exec, if "$(hyprctl -j activewindow | jq .floating)" ; then hyprctl dispatch cyclenext float && hyprctl dispatch alterzorder top; else hyprctl dispatch cyclenext tile; fi

# launch apps (requires: konsole, firefox, wofi)
bind = super, t, exec, konsole
bind = super, b, exec, firefox
bind = super, r, exec, pgrep wofi || wofi -aIi -S drun 

# screenshot (reqires: grim, slurp)
bind = shift ,Print, exec, pgrep slurp || grim
bind = ,Print, exec, pgrep slurp || grim -g "$(slurp)" 
bind = alt ,Print, exec, pgrep slurp || grim -g "$(slurp)" - | wl-copy

# fn keys (requires: wpctl, brightnessctl, playerctl)
binde=, XF86AudioRaiseVolume, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ 0 && wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel=, XF86AudioLowerVolume, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ 0 && wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel=, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel=, XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel=, XF86MonBrightnessDown, exec, brightnessctl set 5%- -n
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous
bindl = ,XF86AudioNext, exec, playerctl next

# lock screen (requires: swaylock)
$wallpaper = /usr/share/hyprland/wall2.png
bind = super, l, exec, swaylock -eF -i $wallpaper
bindl= ,switch:Lid Switch, exec, swaylock -eF -i $wallpaper
