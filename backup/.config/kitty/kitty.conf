# BEGIN_KITTY_THEME
# Dracula
include current-theme.conf
# END_KITTY_THEME



# fonts
font_size 11
font_family FiraCode Nerd Font
disable_ligatures never

# cursors
cursor_blink_interval 0
cursor none

# keymaps
map alt+l disable_ligatures_in active always
map alt+shift+l disable_ligatures_in active never
map ctrl+minus change_font_size all -1.0
map ctrl+= change_font_size all +1.0
map ctrl+0 change_font_size all 0
map ctrl+shift+minus discard_event
map ctrl+shift+plus discard_event
map ctrl+shift+t new_tab !neighbor
# map ctrl+shift+t discard_event
# map ctrl+shift+q discard_event
map ctrl+shift+n discard_event
map ctrl+shift+w discard_event
map ctrl+shift+r discard_event
map ctrl+shift+escape discard_event
map ctrl+shift+alt+t discard_event
map ctrl+shift+enter discard_event

map ctrl+alt+left previous_tab
map ctrl+alt+right next_tab
map ctrl+alt+shift+left move_tab_backward
map ctrl+alt+shift+right move_tab_forward
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5
map ctrl+shift+6 goto_tab 6
map ctrl+shift+7 goto_tab 7
map ctrl+shift+8 goto_tab 8
map ctrl+shift+9 goto_tab 9

# other
enable_audio_bell no
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER -r
confirm_os_window_close 0
mouse_hide_wait -1
shell_integration disabled
placement_strategy top-left
close_on_child_death yes

# linux_display_server x11
# hide_window_decorations yes
